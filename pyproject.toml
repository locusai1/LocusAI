# Tooling config for LocusAI — ruff (lint+format), pytest, coverage.

[tool.ruff]
target-version = "py311"
line-length = 100
exclude = [".venv", "static", "templates", "logs", "businesses", "backups"]

[tool.ruff.lint]
# Valuable checks kept on; rules that fight this codebase's intentional style
# (late/conditional imports, compact one-liners, some bare excepts) are ignored.
select = ["E", "F", "W", "I"]
ignore = [
  "E402",  # module import not at top — intentional lazy/conditional imports throughout
  "E501",  # line length — handled by the formatter
  "E701",  # compact one-line if/blocks used deliberately in places
  "E702",  # compact one-line statements
  "E722",  # bare except — pre-existing; tighten gradually
  "F841",  # unused local — pre-existing; tighten gradually
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["F811", "F401"]  # fixtures/imports patterns common in tests

[tool.coverage.run]
source = ["."]
omit = [
  ".venv/*", "tests/*", "voice_ws.py", "tools/*",
  "view_logs.py", "view_logs_db.py", "add_kb_doc.py", "*/__init__.py",
]

[tool.coverage.report]
skip_covered = false
exclude_lines = ["pragma: no cover", "if __name__ == .__main__.:", "raise NotImplementedError"]

[tool.pytest.ini_options]
testpaths = ["tests"]
