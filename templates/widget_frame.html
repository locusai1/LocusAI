<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chat - {{ business.name }}</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --primary: {{ settings.primary_color or business.accent_color or '#2f6fec' }};
      --primary-hover: color-mix(in srgb, var(--primary), black 15%);
      --bg: #ffffff;
      --text: #1f2937;
      --text-muted: #6b7280;
      --border: #e5e7eb;
      --user-bg: var(--primary);
      --user-text: #ffffff;
      --bot-bg: #f3f4f6;
      --bot-text: #1f2937;
    }

    html, body {
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--text);
      background: var(--bg);
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .header {
      padding: 16px;
      background: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .header-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .header-avatar svg {
      width: 24px;
      height: 24px;
      fill: white;
    }

    .header-title {
      font-weight: 600;
      font-size: 16px;
    }

    .header-status {
      font-size: 12px;
      opacity: 0.9;
    }

    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      word-wrap: break-word;
    }

    .message.user {
      align-self: flex-end;
      background: var(--user-bg);
      color: var(--user-text);
      border-bottom-right-radius: 4px;
    }

    .message.bot {
      align-self: flex-start;
      background: var(--bot-bg);
      color: var(--bot-text);
      border-bottom-left-radius: 4px;
    }

    .typing {
      align-self: flex-start;
      padding: 12px 16px;
      background: var(--bot-bg);
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      display: none;
    }

    .typing.show {
      display: block;
    }

    .typing-dots {
      display: flex;
      gap: 4px;
    }

    .typing-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: bounce 1.4s infinite ease-in-out both;
    }

    .typing-dot:nth-child(1) { animation-delay: -0.32s; }
    .typing-dot:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

    .input-area {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .input-field {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid var(--border);
      border-radius: 24px;
      outline: none;
      font-size: 14px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
    }

    .input-field:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 2px rgba(47, 111, 236, 0.1);
    }

    .send-btn {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--primary);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s;
      flex-shrink: 0;
    }

    .send-btn:hover {
      background: var(--primary-hover);
    }

    .send-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .send-btn svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    .branding {
      padding: 8px;
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
      {% if not settings.show_branding %}display: none;{% endif %}
    }

    .branding a {
      color: var(--text-muted);
      text-decoration: none;
    }

    .branding a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-avatar">
        <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
      </div>
      <div>
        <div class="header-title">{{ business.name }}</div>
        <div class="header-status">We typically reply instantly</div>
      </div>
    </div>

    <div class="messages" id="messages"></div>

    <div class="typing" id="typing">
      <div class="typing-dots">
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
        <div class="typing-dot"></div>
      </div>
    </div>

    <div class="input-area">
      <textarea class="input-field" id="input" placeholder="{{ settings.placeholder_text or 'Type a message...' }}" rows="1"></textarea>
      <button class="send-btn" id="send-btn">
        <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      </button>
    </div>

    <div class="branding">
      Powered by <a href="https://locusai.com" target="_blank" rel="noopener">LocusAI</a>
    </div>
  </div>

  <script>
    const TENANT_KEY = '{{ tenant_key }}';
    const API_BASE = '{{ request.host_url.rstrip("/") }}';

    let sessionId = null;
    let messages = [];

    const messagesEl = document.getElementById('messages');
    const inputEl = document.getElementById('input');
    const sendBtn = document.getElementById('send-btn');
    const typingEl = document.getElementById('typing');

    // API request helper
    async function apiRequest(endpoint, options = {}) {
      const headers = {
        'Content-Type': 'application/json',
        'X-Tenant-Key': TENANT_KEY,
        ...options.headers,
      };

      if (sessionId) {
        headers['X-Session-ID'] = sessionId;
      }

      const response = await fetch(`${API_BASE}api/widget${endpoint}`, {
        ...options,
        headers,
      });

      if (!response.ok) {
        throw new Error(`HTTP ${response.status}`);
      }

      return response.json();
    }

    // Create session
    async function createSession() {
      try {
        const data = await apiRequest('/session', { method: 'POST' });
        sessionId = data.session_id;

        if (data.welcome_message) {
          addMessage('bot', data.welcome_message);
        }
      } catch (error) {
        console.error('Failed to create session:', error);
        addMessage('bot', 'Sorry, I\'m having trouble connecting. Please refresh and try again.');
      }
    }

    // Send message
    async function sendMessage(text) {
      if (!text.trim() || !sessionId) return;

      addMessage('user', text.trim());
      inputEl.value = '';
      inputEl.style.height = 'auto';

      typingEl.classList.add('show');
      scrollToBottom();

      try {
        const data = await apiRequest('/chat', {
          method: 'POST',
          body: JSON.stringify({ message: text.trim(), session_id: sessionId }),
        });

        typingEl.classList.remove('show');

        if (data.reply) {
          addMessage('bot', data.reply);
        }
      } catch (error) {
        typingEl.classList.remove('show');
        addMessage('bot', 'I\'m having trouble right now. Please try again.');
      }
    }

    // Add message to UI
    function addMessage(role, text) {
      messages.push({ role, text });

      const div = document.createElement('div');
      div.className = `message ${role}`;
      div.textContent = text;
      messagesEl.appendChild(div);

      scrollToBottom();
    }

    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    // Event listeners
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage(inputEl.value);
      }
    });

    inputEl.addEventListener('input', () => {
      inputEl.style.height = 'auto';
      inputEl.style.height = Math.min(inputEl.scrollHeight, 100) + 'px';
    });

    sendBtn.addEventListener('click', () => {
      sendMessage(inputEl.value);
    });

    // Initialize
    createSession();
    inputEl.focus();
  </script>
</body>
</html>
