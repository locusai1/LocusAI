<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Sign in - LocusAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='locus.css') }}">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --brand1: {{ accent_color or '#000000' }}; }
  </style>
</head>
<body class="bg-[#fafafa] min-h-screen flex items-center justify-center p-6">
  <div class="w-full max-w-md">
    <!-- Logo -->
    <div class="flex items-center justify-center gap-3 mb-8">
      <div class="w-10 h-10 rounded-xl bg-white border border-[#ebebeb] flex items-center justify-center shadow-sm">
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="LocusAI" class="w-6 h-6 object-contain">
      </div>
      <span class="text-xl font-semibold text-[#171717]">LocusAI</span>
    </div>

    <!-- Login Card -->
    <div class="bg-white border border-[#ebebeb] rounded-xl shadow-sm">
      <div class="p-6 border-b border-[#ebebeb]">
        <h1 class="text-lg font-semibold text-[#171717]">Welcome back</h1>
        <p class="text-sm text-[#737373] mt-1">Sign in to your account to continue</p>
      </div>

      <div class="p-6">
        <!-- Flash Messages -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mb-4 space-y-2">
          {% for category, msg in messages %}
          <div class="p-3 rounded-lg text-sm {% if category=='ok' %}bg-green-50 text-green-700 border border-green-200{% else %}bg-red-50 text-red-700 border border-red-200{% endif %}">
            {{ msg }}
          </div>
          {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login') }}">
          <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

          <div class="mb-4">
            <label class="block text-sm font-medium text-[#171717] mb-1.5">Email</label>
            <input type="email" name="email"
              class="w-full px-3 py-2 text-sm bg-white border border-[#e5e5e5] rounded-lg focus:outline-none focus:border-[#171717] focus:ring-1 focus:ring-[#171717] transition-colors"
              placeholder="you@company.com"
              autocomplete="username"
              required>
          </div>

          <div class="mb-4">
            <label class="block text-sm font-medium text-[#171717] mb-1.5">Password</label>
            <div class="relative">
              <input type="password" name="password" id="pw"
                class="w-full px-3 py-2 pr-14 text-sm bg-white border border-[#e5e5e5] rounded-lg focus:outline-none focus:border-[#171717] focus:ring-1 focus:ring-[#171717] transition-colors"
                placeholder="Enter your password"
                autocomplete="current-password"
                required>
              <button type="button" id="togglePw"
                class="absolute right-3 top-1/2 -translate-y-1/2 text-xs font-medium text-[#737373] hover:text-[#171717] transition-colors">
                Show
              </button>
            </div>
          </div>

          <div class="flex items-center justify-between mb-6">
            <label class="flex items-center gap-2 cursor-pointer">
              <input type="checkbox" name="remember" value="1"
                class="w-4 h-4 rounded border-[#d4d4d4] text-[#171717] focus:ring-[#171717] focus:ring-offset-0">
              <span class="text-sm text-[#737373]">Remember me</span>
            </label>
            <a href="#" class="text-sm font-medium text-[#171717] hover:underline">Forgot password?</a>
          </div>

          <button type="submit"
            class="w-full py-2.5 px-4 bg-[#171717] text-white text-sm font-medium rounded-lg hover:bg-[#404040] transition-colors">
            Sign in
          </button>
        </form>
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-sm text-[#a3a3a3] mt-6">
      Need an account? <a href="#" class="text-[#171717] font-medium hover:underline">Contact your administrator</a>
    </p>
  </div>

  <script>
    const btn = document.getElementById('togglePw');
    if (btn) {
      btn.addEventListener('click', () => {
        const pw = document.getElementById('pw');
        const isPassword = pw.getAttribute('type') === 'password';
        pw.setAttribute('type', isPassword ? 'text' : 'password');
        btn.textContent = isPassword ? 'Hide' : 'Show';
      });
    }
  </script>
</body>
</html>
