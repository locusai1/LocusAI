{% extends "base.html" %}
{% block title %}New Appointment — AxisAI{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h1 class="text-xl font-semibold">New Appointment</h1>
  <a class="text-sm text-slate-600 hover:text-indigo-600" href="{{ url_for('appointments.appointments_index', business_id=business_id) }}">← Back to Appointments</a>
</div>

<form class="card p-6 grid gap-4" method="get" action="{{ url_for('appointments.appointments_new') }}">
  <input type="hidden" name="business_id" value="{{ business_id }}">
  <div class="grid md:grid-cols-3 gap-3">
    <div>
      <label class="block text-xs text-slate-600 mb-1">Service</label>
      <select name="service_id" class="w-full border rounded-lg px-3 py-2" required>
        <option value="">— Select —</option>
        {% if local_mode %}
          {% for s in services %}
            <option value="{{ s['id'] }}" {% if service_id==s['id'] %}selected{% endif %}>{{ s['name'] }} ({{ s['duration_min'] }}m)</option>
          {% endfor %}
        {% else %}
          {% for s in services %}
            <option value="{{ s['id'] }}" {% if service_id==s['id'] %}selected{% endif %}>{{ s['name'] }} ({{ s['duration_min'] }}m)</option>
          {% endfor %}
        {% endif %}
      </select>
    </div>
    <div>
      <label class="block text-xs text-slate-600 mb-1">Date</label>
      <input type="date" name="date" value="{{ date }}" class="w-full border rounded-lg px-3 py-2">
    </div>
    <div class="self-end">
      <button class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700" type="submit">Check Slots</button>
    </div>
  </div>
</form>

{% if slots %}
<form class="card p-6 grid gap-4 mt-4" method="post" action="{{ url_for('appointments.appointments_new') }}">
  <input type="hidden" name="business_id" value="{{ business_id }}">
  <input type="hidden" name="service_id" value="{{ service_id }}">
  <input type="hidden" name="date" value="{{ date }}">

  <div class="grid md:grid-cols-2 gap-3">
    <div>
      <label class="block text-xs text-slate-600 mb-1">Customer name</label>
      <input class="w-full border rounded-lg px-3 py-2" name="customer_name" required value="{{ values.get('customer_name','') }}">
    </div>
    <div>
      <label class="block text-xs text-slate-600 mb-1">Phone</label>
      <input class="w-full border rounded-lg px-3 py-2" name="phone" value="{{ values.get('phone','') }}">
    </div>
    <div>
      <label class="block text-xs text-slate-600 mb-1">Email (for .ics)</label>
      <input class="w-full border rounded-lg px-3 py-2" type="email" name="email" value="{{ values.get('email','') }}">
    </div>
    <div>
      <label class="block text-xs text-slate-600 mb-1">Notes</label>
      <input class="w-full border rounded-lg px-3 py-2" name="notes" value="{{ values.get('notes','') }}">
    </div>
  </div>

  <div>
    <label class="block text-xs text-slate-600 mb-1 mt-2">Pick a time</label>
    <div class="flex flex-wrap gap-2">
      {% for t in slots %}
        <label class="inline-flex items-center gap-2 px-3 py-1.5 rounded-lg border cursor-pointer">
          <input type="radio" name="slot" value="{{ t }}" {% if values.get('slot')==t %}checked{% endif %}>
          <span>{{ t[11:] }}</span>
        </label>
      {% endfor %}
    </div>
  </div>

  <div>
    <button class="px-4 py-2 rounded-lg bg-emerald-600 text-white hover:bg-emerald-700" type="submit">Book Appointment</button>
  </div>
</form>
{% elif service_id %}
<div class="card p-6 mt-4 text-slate-600">No free slots on {{ date }} for the selected service.</div>
{% endif %}
{% endblock %}
