<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Set a new password — LocusAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='fonts.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='public.css') }}">
  <style>
    .sb { height:5px; border-radius:999px; background:var(--pf-bg-tint); flex:1; transition:background .2s; }
    .sb.weak{background:#ef4444;} .sb.medium{background:#f59e0b;} .sb.strong{background:#22c55e;}
  </style>
</head>
<body class="pf">
<div class="pf-aurora" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;background:var(--pf-bg-soft);">
  <div style="width:100%;max-width:420px;">
    <a href="{{ url_for('home') }}" class="pf-logo" style="justify-content:center;margin-bottom:24px;">
      <span class="pf-logo__mark"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg></span>
      <span class="pf-logo__text">LocusAI</span>
    </a>
    <div class="pf-card" style="padding:32px;">
      <h1 class="pf-h2" style="font-size:24px;">Set a new password</h1>
      <p class="pf-lead" style="font-size:14.5px;margin:8px 0 22px;">Choose a strong password for your account.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div class="{% if category=='ok' %}{% else %}pf-error{% endif %}"
               style="{% if category=='ok' %}background:var(--pf-green-bg);border:1px solid #86efac;color:#166534;padding:11px 14px;border-radius:var(--pf-r);font-size:14px;margin-bottom:14px;{% endif %}">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="pf-field">
          <label class="pf-label">New password</label>
          <div style="position:relative;">
            <input type="password" name="password" id="pw" class="pf-input" placeholder="At least 8 characters" autocomplete="new-password" required style="padding-right:64px;">
            <button type="button" id="togglePw" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--pf-a-3);cursor:pointer;padding:6px 8px;">Show</button>
          </div>
          <div style="display:flex;gap:6px;margin-top:10px;"><div class="sb" id="sb1"></div><div class="sb" id="sb2"></div><div class="sb" id="sb3"></div></div>
        </div>
        <div class="pf-field">
          <label class="pf-label">Confirm password</label>
          <div style="position:relative;">
            <input type="password" name="confirm_password" id="pw2" class="pf-input" placeholder="Re-enter your password" autocomplete="new-password" required style="padding-right:64px;">
            <button type="button" id="togglePw2" style="position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--pf-a-3);cursor:pointer;padding:6px 8px;">Show</button>
          </div>
        </div>
        <button type="submit" class="pf-btn pf-btn-primary pf-btn-block pf-btn-lg">Update password</button>
      </form>
    </div>
    <p style="text-align:center;margin-top:20px;font-size:14px;">
      <a href="{{ url_for('auth.login') }}" style="color:var(--pf-a-3);font-weight:600;text-decoration:none;">← Back to sign in</a>
    </p>
  </div>
</div>
<script>
  function tog(b,i){var B=document.getElementById(b),I=document.getElementById(i);if(B&&I)B.addEventListener('click',function(){var s=I.type==='password';I.type=s?'text':'password';B.textContent=s?'Hide':'Show';});}
  tog('togglePw','pw'); tog('togglePw2','pw2');
  (function(){ var p=document.getElementById('pw'); var bars=[document.getElementById('sb1'),document.getElementById('sb2'),document.getElementById('sb3')];
    if(!p)return; p.addEventListener('input',function(){ var v=p.value, s=0;
      if(v.length>=8)s++; if(v.length>=12||(/[A-Z]/.test(v)&&/[0-9]/.test(v)))s++; if(v.length>=16||/[^A-Za-z0-9]/.test(v))s++;
      var cls=['weak','medium','strong']; bars.forEach(function(b,i){ b.className='sb'; if(i<s)b.classList.add(cls[Math.min(s-1,2)]); });
    });
  })();
</script>
</body>
</html>
