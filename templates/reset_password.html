<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8">
  <title>Choose new password — LocusAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='locus.css') }}">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #fafafa 0%, #f5f5f5 50%, #fafafa 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
      opacity: 0.03;
      pointer-events: none;
    }

    .login-container {
      width: 100%;
      max-width: 400px;
      animation: fadeInUp 500ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #171717 0%, #404040 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 4px rgba(0,0,0,.1), 0 4px 12px rgba(0,0,0,.08), inset 0 1px 0 rgba(255,255,255,.1);
    }

    .logo-icon img { width: 26px; height: 26px; filter: invert(1); }

    .logo-text { font-size: 24px; font-weight: 600; letter-spacing: -0.03em; color: #171717; }

    .login-card {
      background: white;
      border: 1px solid rgba(0,0,0,.06);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 1px 3px rgba(0,0,0,.02), 0 4px 12px rgba(0,0,0,.04), 0 16px 40px rgba(0,0,0,.06);
      position: relative;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 20px; right: 20px;
      height: 1px;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.8) 50%, transparent 100%);
    }

    .login-header {
      padding: 28px 28px 24px;
      border-bottom: 1px solid #f5f5f5;
      background: linear-gradient(180deg, rgba(250,250,250,.5) 0%, transparent 100%);
    }

    .login-title { font-size: 20px; font-weight: 600; letter-spacing: -0.02em; color: #171717; }
    .login-subtitle { font-size: 14px; color: #737373; margin-top: 6px; }

    .login-body { padding: 28px; }

    .alert {
      padding: 14px 16px;
      border-radius: 12px;
      font-size: 14px;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      animation: fadeInUp 300ms cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .alert-success {
      background: rgba(34,197,94,.08);
      color: #16a34a;
      border: 1px solid rgba(34,197,94,.15);
    }

    .alert-error {
      background: rgba(239,68,68,.08);
      color: #dc2626;
      border: 1px solid rgba(239,68,68,.15);
    }

    .form-group { margin-bottom: 22px; }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      color: #171717;
      margin-bottom: 8px;
    }

    .password-wrapper { position: relative; }

    .form-input {
      width: 100%;
      padding: 13px 16px;
      font-size: 14px;
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 12px;
      color: #171717;
      transition: border-color 180ms cubic-bezier(.4,0,.2,1), box-shadow 180ms cubic-bezier(.4,0,.2,1), background-color 180ms cubic-bezier(.4,0,.2,1);
      box-shadow: inset 0 1px 2px rgba(0,0,0,.04);
    }

    .form-input:hover { background: #f5f5f5; border-color: #d4d4d4; }

    .form-input:focus {
      outline: none;
      background: white;
      border-color: #171717;
      box-shadow: 0 0 0 3px rgba(23,23,23,.08), inset 0 1px 2px rgba(0,0,0,.04);
    }

    .form-input::placeholder { color: #a3a3a3; }

    .password-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      font-size: 13px;
      font-weight: 500;
      color: #737373;
      cursor: pointer;
      padding: 4px 8px;
      border-radius: 6px;
      transition: color 150ms, background 150ms;
    }

    .password-toggle:hover { color: #171717; background: rgba(0,0,0,.05); }

    .form-hint { font-size: 13px; color: #a3a3a3; margin-top: 6px; }

    .submit-btn {
      width: 100%;
      padding: 14px 24px;
      background: linear-gradient(180deg, #262626 0%, #171717 100%);
      color: white;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      box-shadow: 0 1px 2px rgba(0,0,0,.15), 0 4px 12px rgba(0,0,0,.1), inset 0 1px 0 rgba(255,255,255,.1);
      transition: background 180ms, transform 120ms, box-shadow 180ms;
      position: relative;
      overflow: hidden;
    }

    .submit-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .submit-btn:hover {
      background: linear-gradient(180deg, #404040 0%, #2a2a2a 100%);
      box-shadow: 0 2px 4px rgba(0,0,0,.15), 0 8px 20px rgba(0,0,0,.12), inset 0 1px 0 rgba(255,255,255,.1);
      transform: translateY(-1px);
    }

    .submit-btn:active {
      transform: translateY(0) scale(0.98);
      box-shadow: 0 1px 2px rgba(0,0,0,.15), 0 2px 8px rgba(0,0,0,.1);
    }

    .password-strength {
      margin-top: 8px;
      display: flex;
      gap: 4px;
    }

    .strength-bar {
      height: 3px;
      flex: 1;
      border-radius: 2px;
      background: #e5e5e5;
      transition: background 200ms;
    }

    .strength-bar.weak   { background: #ef4444; }
    .strength-bar.medium { background: #f59e0b; }
    .strength-bar.strong { background: #22c55e; }

    .login-footer {
      text-align: center;
      margin-top: 28px;
      font-size: 14px;
      color: #a3a3a3;
    }

    .login-footer a {
      color: #171717;
      font-weight: 500;
      text-decoration: none;
      transition: color 150ms;
    }

    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <div class="logo-icon">
        <img src="{{ url_for('static', filename='logo.svg') }}" alt="">
      </div>
      <span class="logo-text">LocusAI</span>
    </div>

    <div class="login-card">
      <div class="login-header">
        <h1 class="login-title">Choose a new password</h1>
        <p class="login-subtitle">Enter and confirm your new password below</p>
      </div>

      <div class="login-body">
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        {% for category, msg in messages %}
        <div class="alert {% if category=='ok' %}alert-success{% else %}alert-error{% endif %}">
          {{ msg }}
        </div>
        {% endfor %}
        {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.reset_password', token=token) }}">
          <div class="form-group">
            <label class="form-label">New password</label>
            <div class="password-wrapper">
              <input type="password" name="password" id="pw" class="form-input"
                     placeholder="At least 8 characters"
                     autocomplete="new-password"
                     style="padding-right: 60px;"
                     required>
              <button type="button" class="password-toggle" id="togglePw">Show</button>
            </div>
            <div class="password-strength">
              <div class="strength-bar" id="sb1"></div>
              <div class="strength-bar" id="sb2"></div>
              <div class="strength-bar" id="sb3"></div>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Confirm password</label>
            <div class="password-wrapper">
              <input type="password" name="confirm_password" id="pw2" class="form-input"
                     placeholder="Repeat your new password"
                     autocomplete="new-password"
                     style="padding-right: 60px;"
                     required>
              <button type="button" class="password-toggle" id="togglePw2">Show</button>
            </div>
          </div>

          <button type="submit" class="submit-btn">Set new password</button>
        </form>
      </div>
    </div>

    <p class="login-footer">
      <a href="{{ url_for('auth.login') }}">← Back to sign in</a>
    </p>
  </div>

  <script>
    // Show/hide toggles
    function makeToggle(btnId, inputId) {
      const btn = document.getElementById(btnId);
      const input = document.getElementById(inputId);
      if (btn && input) {
        btn.addEventListener('click', () => {
          const show = input.type === 'password';
          input.type = show ? 'text' : 'password';
          btn.textContent = show ? 'Hide' : 'Show';
        });
      }
    }
    makeToggle('togglePw', 'pw');
    makeToggle('togglePw2', 'pw2');

    // Password strength indicator
    const pwInput = document.getElementById('pw');
    const bars = [document.getElementById('sb1'), document.getElementById('sb2'), document.getElementById('sb3')];

    pwInput && pwInput.addEventListener('input', () => {
      const v = pwInput.value;
      let score = 0;
      if (v.length >= 8) score++;
      if (v.length >= 12 || /[A-Z]/.test(v) && /[0-9]/.test(v)) score++;
      if (v.length >= 16 || /[^A-Za-z0-9]/.test(v)) score++;

      const classes = ['weak', 'medium', 'strong'];
      bars.forEach((b, i) => {
        b.className = 'strength-bar';
        if (i < score) b.classList.add(classes[Math.min(score - 1, 2)]);
      });
    });
  </script>
</body>
</html>
