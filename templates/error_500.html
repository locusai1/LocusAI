{% extends "base.html" %}
{% block title %}Something went wrong — AxisAI{% endblock %}
{% block content %}
<div class="mx-auto max-w-lg text-center">
  <div class="text-7xl font-black text-rose-300">500</div>
  <h1 class="text-xl font-semibold mt-2">We hit a snag</h1>
  <p class="text-slate-600 mt-2">Our team has been notified. Please try again.</p>
  <p class="text-xs text-slate-400 mt-1">Request ID: {{ rid }}</p>
  <a href="{{ url_for('dashboard') }}" class="inline-block mt-6 px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700">Back to Dashboard</a>
</div>
{% endblock %}
