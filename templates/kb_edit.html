{% extends "base.html" %}
{% block title %}LocusAI — {{ 'New' if mode=='new' else 'Edit' }} KB Entry{% endblock %}
{% block content %}
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-semibold">{{ 'New' if mode=='new' else 'Edit' }} KB Entry</h1>
    <a href="{{ url_for('kb.kb_index', business_id=(business_id or (entry['business_id'] if entry else None))) }}" class="text-sm text-slate-600 hover:text-indigo-600">← Back to KB</a>
  </div>

  <form method="POST" class="grid gap-4 max-w-3xl bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
    <div>
      <label class="block text-xs text-slate-600 mb-1">Business</label>
      <select class="w-full border rounded-lg px-3 py-2 bg-white" name="business_id" required>
        {% for b in businesses %}
          {% set selected = (b['id']==(business_id or (entry['business_id'] if entry else 0))) %}
          <option value="{{ b['id'] }}" {% if selected %}selected{% endif %}>{{ b['name'] }}</option>
        {% endfor %}
      </select>
    </div>

    <div>
      <label class="block text-xs text-slate-600 mb-1">Question *</label>
      <input class="w-full border rounded-lg px-3 py-2" type="text" name="question" required value="{{ entry['question'] if entry else '' }}" />
    </div>

    <div>
      <label class="block text-xs text-slate-600 mb-1">Answer *</label>
      <textarea class="w-full border rounded-lg px-3 py-2 min-h-[140px]" name="answer" required>{{ entry['answer'] if entry else '' }}</textarea>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-slate-600 mb-1">Tags (comma-separated)</label>
        <input class="w-full border rounded-lg px-3 py-2" type="text" name="tags" value="{{ entry['tags'] if entry else '' }}" />
      </div>
      <div class="flex items-center gap-2 mt-6">
        <input type="checkbox" id="active" name="active" {% if (entry and entry['active']) or mode=='new' %}checked{% endif %} />
        <label for="active">Active</label>
      </div>
    </div>

    <div>
      <button class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700" type="submit">{{ 'Create' if mode=='new' else 'Save' }}</button>
    </div>
  </form>
{% endblock %}
