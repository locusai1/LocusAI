<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Reset your password — LocusAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='fonts.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='public.css') }}">
</head>
<body class="pf">
<div class="pf-aurora" style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 24px;background:var(--pf-bg-soft);">
  <div style="width:100%;max-width:420px;">
    <a href="{{ url_for('home') }}" class="pf-logo" style="justify-content:center;margin-bottom:24px;">
      <span class="pf-logo__mark"><svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"/></svg></span>
      <span class="pf-logo__text">LocusAI</span>
    </a>
    <div class="pf-card" style="padding:32px;">
      <h1 class="pf-h2" style="font-size:24px;">Reset your password</h1>
      <p class="pf-lead" style="font-size:14.5px;margin:8px 0 22px;">Enter your email and we'll send you a link to set a new password.</p>
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, msg in messages %}
          <div style="background:var(--pf-green-bg);border:1px solid #86efac;color:#166534;padding:11px 14px;border-radius:var(--pf-r);font-size:14px;margin-bottom:14px;">{{ msg }}</div>
        {% endfor %}
      {% endwith %}
      <form method="POST" action="{{ url_for('auth.forgot_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
        <div class="pf-field">
          <label class="pf-label">Email</label>
          <input type="email" name="email" class="pf-input" placeholder="you@company.com" autocomplete="email" required>
        </div>
        <button type="submit" class="pf-btn pf-btn-primary pf-btn-block pf-btn-lg">Send reset link</button>
      </form>
    </div>
    <p style="text-align:center;margin-top:20px;font-size:14px;">
      <a href="{{ url_for('auth.login') }}" style="color:var(--pf-a-3);font-weight:600;text-decoration:none;">← Back to sign in</a>
    </p>
  </div>
</div>
</body>
</html>
