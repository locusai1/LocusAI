<!DOCTYPE html>
<html>
<head>
  <title>Delete Business</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container py-5">
  <div class="card p-4 shadow-sm">
    <h2 class="text-danger">Delete Business: {{ business['name'] }}</h2>

    <p class="mt-3">⚠️ Are you sure you want to delete this business?<br>
    This will also remove all its info, FAQs, sessions, and appointments.<br>
    <b>This action cannot be undone.</b></p>

    <form method="POST" class="d-flex gap-2 mt-4">
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{{ url_for('businesses') }}" class="btn btn-secondary">Cancel</a>
    </form>
  </div>
</body>
</html>
