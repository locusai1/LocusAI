{% extends "base.html" %}
{% block title %}LocusAI — New Business{% endblock %}
{% block content %}
  <div class="flex items-center justify-between mb-4">
    <h1 class="text-xl font-semibold">New Business</h1>
    <a href="{{ url_for('dashboard') }}" class="text-sm text-slate-600 hover:text-indigo-600">← Back to Dashboard</a>
  </div>

  <form method="POST" class="grid gap-4 max-w-3xl bg-white p-6 rounded-xl border border-slate-200 shadow-sm">
    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-slate-600 mb-1">Name *</label>
        <input class="w-full border rounded-lg px-3 py-2" type="text" name="name" value="{{ form.get('name','') }}" required />
      </div>
      <div>
        <label class="block text-xs text-slate-600 mb-1">Slug *</label>
        <input class="w-full border rounded-lg px-3 py-2" type="text" name="slug" value="{{ form.get('slug','') }}" placeholder="auto-generated if blank" />
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-slate-600 mb-1">Hours</label>
        <input class="w-full border rounded-lg px-3 py-2" type="text" name="hours" value="{{ form.get('hours','') }}" placeholder="Mon–Fri 9:00–18:00" />
      </div>
      <div>
        <label class="block text-xs text-slate-600 mb-1">Tone</label>
        <input class="w-full border rounded-lg px-3 py-2" type="text" name="tone" value="{{ form.get('tone','') }}" placeholder="friendly and professional" />
      </div>
    </div>

    <div>
      <label class="block text-xs text-slate-600 mb-1">Address</label>
      <input class="w-full border rounded-lg px-3 py-2" type="text" name="address" value="{{ form.get('address','') }}" placeholder="123 High Street, London" />
    </div>

    <div>
      <label class="block text-xs text-slate-600 mb-1">Services (comma-separated)</label>
      <textarea class="w-full border rounded-lg px-3 py-2 min-h-[90px]" name="services" placeholder="Checkups, fillings, whitening">{{ form.get('services','') }}</textarea>
    </div>

    <div class="grid md:grid-cols-2 gap-4">
      <div>
        <label class="block text-xs text-slate-600 mb-1">Escalation Phone</label>
        <input class="w-full border rounded-lg px-3 py-2" type="text" name="escalation_phone" value="{{ form.get('escalation_phone','') }}" />
      </div>
      <div>
        <label class="block text-xs text-slate-600 mb-1">Escalation Email</label>
        <input class="w-full border rounded-lg px-3 py-2" type="email" name="escalation_email" value="{{ form.get('escalation_email','') }}" />
      </div>
    </div>

    <div class="max-w-xs">
      <label class="block text-xs text-slate-600 mb-1">Data Retention (days)</label>
      <input class="w-full border rounded-lg px-3 py-2" type="number" min="1" name="data_retention_days" value="{{ form.get('data_retention_days','365') }}" />
    </div>

    <div>
      <button class="px-4 py-2 rounded-lg bg-indigo-600 text-white hover:bg-indigo-700" type="submit">Create</button>
    </div>
  </form>
{% endblock %}
